<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Postacie</title>
<script src="/socket.io/socket.io.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #f0d080;
    --gold-dark: #7a5f1e;
    --bg: #090806;
    --surface: #110e09;
    --border: #3a2e1a;
    --text: #d4c4a0;
    --text-dim: #7a6a50;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Crimson Text', serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .bg-layer {
    position: fixed; inset: 0; z-index: 0;
    background: radial-gradient(ellipse 80% 40% at 50% 0%, rgba(80,20,20,0.12) 0%, transparent 55%), #090806;
  }
  /* TOP NAV */
  .topnav {
    position: relative; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    max-width: 1200px; margin: 0 auto; padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(to bottom, rgba(17,14,9,0.96), rgba(9,8,6,0.8));
  }
  .nav-left { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .nav-btn {
    font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 2px;
    color: var(--gold-dark); background: rgba(201,168,76,0.06);
    border: 1px solid rgba(201,168,76,0.25); border-radius: 2px;
    padding: 7px 14px; cursor: pointer; text-decoration: none; display: inline-block;
    transition: all 0.2s; text-transform: uppercase;
  }
  .nav-btn:hover { color: var(--gold); border-color: rgba(201,168,76,0.6); background: rgba(201,168,76,0.12); }
  /* STATUS BAR */
  .statusbar {
    position: relative; z-index: 1;
    max-width: 1200px; margin: 0 auto;
    display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
    padding: 10px 20px;
    background: rgba(17,14,9,0.5);
    border-bottom: 1px solid rgba(58,46,26,0.5);
    font-size: 14px;
  }
  .status-item { display: flex; align-items: center; gap: 8px; }
  .status-label { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase; }
  .status-value { font-family: 'Cinzel', serif; font-size: 14px; color: var(--gold); letter-spacing: 1px; }
  .divider-v { width: 1px; height: 20px; background: var(--border); }
  /* RESET CONTROLS */
  .reset-controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .num-input {
    width: 48px; text-align: center;
    background: rgba(0,0,0,0.5); border: 1px solid rgba(201,168,76,0.25);
    color: var(--gold); font-family: 'Cinzel', serif; font-size: 13px;
    padding: 4px 6px; border-radius: 2px; outline: none;
    transition: border-color 0.2s;
  }
  .num-input:focus { border-color: rgba(201,168,76,0.6); }
  .action-btn {
    font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--gold-dark); background: rgba(201,168,76,0.06);
    border: 1px solid rgba(201,168,76,0.25); border-radius: 2px;
    padding: 6px 12px; cursor: pointer; transition: all 0.2s;
  }
  .action-btn:hover { color: var(--gold); border-color: rgba(201,168,76,0.6); background: rgba(201,168,76,0.14); }
  .action-btn.danger { color: #cc5555; border-color: rgba(180,60,60,0.3); background: rgba(140,40,40,0.06); }
  .action-btn.danger:hover { color: #ff8080; border-color: rgba(200,60,60,0.7); background: rgba(140,40,40,0.18); }
  /* MAIN */
  .main {
    position: relative; z-index: 1;
    max-width: 1200px; margin: 20px auto; padding: 0 20px 40px;
  }
  .page-title {
    font-family: 'Cinzel', serif; font-size: 13px; letter-spacing: 5px;
    color: var(--text-dim); text-transform: uppercase; text-align: center;
    margin-bottom: 20px;
  }
  .ornament-line {
    display: flex; align-items: center; gap: 10px; justify-content: center; margin-bottom: 24px;
  }
  .ornament-line::before, .ornament-line::after {
    content: ''; flex: 1; height: 1px; max-width: 150px;
    background: linear-gradient(to right, transparent, var(--gold-dark), transparent);
  }
  .ornament-diamond { width: 6px; height: 6px; background: var(--gold); transform: rotate(45deg); opacity: 0.6; }
  /* GRID */
  .char-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 16px;
  }
  /* CHARACTER CARD */
  .char-card {
    background: linear-gradient(160deg, #1c1510, #0e0b07);
    border: 1px solid var(--border); border-radius: 3px; overflow: hidden;
    position: relative; transition: border-color 0.3s, box-shadow 0.3s;
  }
  .char-card:hover { border-color: rgba(201,168,76,0.35); box-shadow: 0 4px 30px rgba(0,0,0,0.5); }
  .char-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(to right, transparent, rgba(201,168,76,0.3), transparent);
  }
  .char-header {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px;
    background: rgba(0,0,0,0.35);
    border-bottom: 1px solid var(--border);
  }
  .char-icon { width: 32px; height: 32px; object-fit: contain; filter: saturate(0.8); }
  .char-name {
    font-family: 'Cinzel', serif; font-size: 13px; font-weight: 600;
    color: var(--gold-light); letter-spacing: 1px;
  }
  .char-body { padding: 10px 12px 12px; }
  /* TASKS */
  .task-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 8px; margin-bottom: 4px; border-radius: 2px;
    background: rgba(0,0,0,0.3); border: 1px solid rgba(58,46,26,0.5);
    transition: background 0.2s, border-color 0.2s;
  }
  .task-row.done {
    background: rgba(42,160,70,0.08);
    border-color: rgba(42,160,70,0.3);
  }
  .task-left { display: flex; align-items: center; gap: 8px; }
  .task-icon { width: 18px; height: 18px; object-fit: contain; opacity: 0.85; }
  .task-name { font-size: 14px; color: var(--text); }
  .task-row.done .task-name { color: #70d080; }
  .task-right { display: flex; align-items: center; gap: 6px; }
  /* CHECKBOX */
  .task-cb { appearance: none; width: 16px; height: 16px; border: 1px solid rgba(201,168,76,0.35); background: rgba(0,0,0,0.4); border-radius: 2px; cursor: pointer; position: relative; transition: all 0.2s; flex-shrink: 0; }
  .task-cb:checked { background: rgba(42,160,70,0.3); border-color: rgba(60,200,80,0.7); }
  .task-cb:checked::after { content: '✓'; position: absolute; top: -1px; left: 2px; font-size: 12px; color: #80ff90; }
  /* REMOVE BTN */
  .remove-btn {
    font-size: 10px; color: rgba(180,60,60,0.6); background: none;
    border: none; cursor: pointer; padding: 2px 4px; transition: color 0.2s; line-height: 1;
  }
  .remove-btn:hover { color: #ff6060; }
  /* MEDAL ROW */
  .medal-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 8px; margin-bottom: 4px; border-radius: 2px;
    background: rgba(201,168,76,0.05); border: 1px solid rgba(201,168,76,0.2);
    transition: background 0.3s, border-color 0.3s;
  }
  .medal-row.done-today {
    background: rgba(42,160,70,0.1); border-color: rgba(60,200,80,0.4);
  }
  .medal-left { display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--gold-dark); }
  .medal-timer { font-family: 'Cinzel', serif; font-size: 12px; color: var(--text-dim); margin-top: 2px; letter-spacing: 1px; }
  .medal-done { color: #60e080; }
  .give-btn {
    font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 1px; text-transform: uppercase;
    color: var(--gold-dark); background: rgba(201,168,76,0.08);
    border: 1px solid rgba(201,168,76,0.3); border-radius: 2px;
    padding: 4px 10px; cursor: pointer; transition: all 0.2s;
  }
  .give-btn:hover { color: var(--gold); border-color: rgba(201,168,76,0.6); background: rgba(201,168,76,0.18); }
  /* ADD TASK */
  .add-task-panel {
    display: flex; align-items: center; gap: 6px; margin-top: 8px;
    padding: 6px 8px; border-radius: 2px;
    background: rgba(0,0,0,0.2); border: 1px dashed rgba(201,168,76,0.15);
  }
  .task-select {
    flex: 1; background: rgba(0,0,0,0.5); border: 1px solid rgba(201,168,76,0.2);
    color: var(--text-dim); font-family: 'Crimson Text', serif; font-size: 13px;
    padding: 4px 6px; border-radius: 2px; outline: none;
  }
  .add-btn {
    font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 1px; text-transform: uppercase;
    color: var(--gold-dark); background: rgba(201,168,76,0.08);
    border: 1px solid rgba(201,168,76,0.3); border-radius: 2px;
    padding: 5px 10px; cursor: pointer; transition: all 0.2s;
  }
  .add-btn:hover { color: var(--gold); border-color: rgba(201,168,76,0.6); background: rgba(201,168,76,0.18); }

  /* DODAJ/USUŃ POSTAĆ */
  .char-mgmt-bar {
    display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
    max-width: 1200px; margin: 0 auto 16px; padding: 0 20px;
  }
  .char-mgmt-input {
    background: rgba(0,0,0,0.5); border: 1px solid rgba(201,168,76,0.25);
    color: var(--text); font-family: 'Crimson Text', serif; font-size: 15px;
    padding: 6px 10px; border-radius: 2px; outline: none; width: 180px;
    transition: border-color 0.2s;
  }
  .char-mgmt-input:focus { border-color: rgba(201,168,76,0.55); }
  .char-mgmt-btn {
    font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--gold-dark); background: rgba(201,168,76,0.07);
    border: 1px solid rgba(201,168,76,0.3); border-radius: 2px;
    padding: 7px 16px; cursor: pointer; transition: all 0.2s;
  }
  .char-mgmt-btn:hover { color: var(--gold); border-color: rgba(201,168,76,0.6); background: rgba(201,168,76,0.15); }
  .char-delete-btn {
    font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 1px; text-transform: uppercase;
    color: #804040; border: 1px solid rgba(180,50,50,0.25); border-radius: 2px;
    background: rgba(140,30,30,0.06); padding: 3px 8px; cursor: pointer; transition: all 0.2s;
    margin-left: auto; flex-shrink: 0;
  }
  .char-delete-btn:hover { color: #ff6060; border-color: rgba(200,60,60,0.6); background: rgba(140,30,30,0.18); }
  .icon-select {
    background: rgba(0,0,0,0.5); border: 1px solid rgba(201,168,76,0.25);
    color: var(--text); font-family: 'Crimson Text', serif; font-size: 14px;
    padding: 6px 8px; border-radius: 2px; outline: none;
  }

  /* KALKULATOR ELIKSIRÓW */
  .elix-panel {
    position: fixed; bottom: 20px; right: 20px; z-index: 200;
    width: 320px;
    background: linear-gradient(160deg, #1c1510, #0e0b07);
    border: 1px solid var(--gold-dark); border-radius: 4px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), 0 0 20px rgba(201,168,76,0.06);
    transition: transform 0.3s, opacity 0.3s;
  }
  .elix-panel.collapsed .elix-body { display: none; }
  .elix-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; cursor: pointer;
    border-bottom: 1px solid rgba(58,46,26,0.6);
    background: rgba(0,0,0,0.3); border-radius: 4px 4px 0 0;
  }
  .elix-header:hover { background: rgba(201,168,76,0.05); }
  .elix-header-title {
    font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 3px;
    color: var(--gold); text-transform: uppercase;
  }
  .elix-toggle { color: var(--gold-dark); font-size: 12px; transition: transform 0.3s; }
  .elix-panel.collapsed .elix-toggle { transform: rotate(180deg); }
  .elix-body { padding: 14px; }
  .elix-section { margin-bottom: 14px; }
  .elix-section:last-child { margin-bottom: 0; }
  .elix-section-title {
    font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 2px;
    color: var(--text-dim); text-transform: uppercase; margin-bottom: 8px;
    padding-bottom: 4px; border-bottom: 1px solid rgba(58,46,26,0.4);
  }
  .elix-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .elix-label { font-size: 12px; color: var(--text-dim); flex: 1; }
  .elix-select, .elix-input {
    background: rgba(0,0,0,0.5); border: 1px solid rgba(201,168,76,0.2);
    color: var(--text); font-family: 'Cinzel', serif; font-size: 12px;
    padding: 5px 8px; border-radius: 2px; outline: none;
    transition: border-color 0.2s;
  }
  .elix-select { width: 85px; }
  .elix-input  { width: 70px; text-align: center; }
  .elix-select:focus, .elix-input:focus { border-color: rgba(201,168,76,0.5); }
  .elix-result {
    background: rgba(0,0,0,0.4); border: 1px solid rgba(201,168,76,0.15);
    border-radius: 2px; padding: 8px 10px; margin-top: 4px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .elix-result-label { font-size: 11px; color: var(--text-dim); }
  .elix-result-val {
    font-family: 'Cinzel', serif; font-size: 14px; font-weight: 600;
    color: var(--gold-light); letter-spacing: 1px;
  }
  .elix-result-val.zero { color: #60e080; }
  .elix-result-val.many { color: #ff9060; }
  .elix-icon { width: 36px; height: 36px; object-fit: contain; flex-shrink: 0; }
  .elix-section-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .elix-section-header .elix-section-title { margin-bottom: 0; border-bottom: none; padding-bottom: 0; flex: 1; }
  .elix-bar-wrap {
    height: 10px; background: rgba(0,0,0,0.5); border-radius: 5px;
    overflow: hidden; margin: 6px 0 8px; border: 1px solid rgba(255,255,255,0.06);
  }
  .elix-bar {
    height: 100%; border-radius: 5px; transition: width 0.4s ease;
  }
  .elix-bar.hp { background: linear-gradient(to right, #8b0000, #ff3030, #ff6060); box-shadow: 0 0 8px rgba(255,50,50,0.5); }
  .elix-bar.mp { background: linear-gradient(to right, #00008b, #3060ff, #60a0ff); box-shadow: 0 0 8px rgba(60,100,255,0.5); }
  .elix-pct-label { font-family: 'Cinzel', serif; font-size: 10px; color: var(--text-dim); text-align: right; margin-bottom: 4px; }

  /* DRAG & DROP */
  .char-grid {
    user-select: none;
  }
  .char-card {
    cursor: grab;
    transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s;
  }
  .char-card:active { cursor: grabbing; }
  .char-card.dragging {
    opacity: 0.35;
    transform: scale(0.97);
  }
  .char-card.drag-over {
    box-shadow: 0 0 0 2px var(--gold), 0 0 20px rgba(201,168,76,0.3);
  }
  .drag-handle {
    position: absolute; top: 8px; right: 8px;
    color: rgba(201,168,76,0.25); font-size: 14px; cursor: grab;
    transition: color 0.2s; line-height: 1;
    pointer-events: none;
  }
  .char-card:hover .drag-handle { color: rgba(201,168,76,0.6); }

  /* KU rename */
  .task-name-editable {
    cursor: pointer; border-bottom: 1px dashed rgba(201,168,76,0.3);
    padding: 0 2px; transition: border-color 0.2s;
  }
  .task-name-editable:hover { border-color: rgba(201,168,76,0.7); color: var(--gold-light); }
  .task-name-input {
    background: rgba(0,0,0,0.6); border: 1px solid rgba(201,168,76,0.5);
    color: var(--gold-light); font-family: 'Crimson Text', serif; font-size: 14px;
    padding: 1px 5px; border-radius: 2px; outline: none; width: 100px;
  }

  /* BIOLOG panel */
  .bio-panel {
    padding: 6px 8px; margin-bottom: 4px; border-radius: 2px;
    background: rgba(201,168,76,0.05); border: 1px solid rgba(201,168,76,0.2);
    transition: background 0.3s, border-color 0.3s;
  }
  .bio-panel.done-ok {
    background: rgba(42,160,70,0.1); border-color: rgba(60,200,80,0.45);
  }
  .bio-panel.done-fail {
    background: rgba(160,42,42,0.1); border-color: rgba(200,60,60,0.45);
  }
  .bio-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .bio-icon { width: 20px; height: 20px; object-fit: contain; }
  .bio-title { font-size: 14px; color: var(--text); }
  .bio-done-wrap { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; }
  .bio-done-label { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 1px; color: var(--text-dim); text-transform: uppercase; }
  .bio-done-input {
    width: 50px; text-align: center;
    background: rgba(0,0,0,0.5); border: 1px solid rgba(201,168,76,0.2);
    color: var(--text); font-family: 'Cinzel', serif; font-size: 13px;
    padding: 3px 6px; border-radius: 2px; outline: none;
  }
  .bio-done-input:focus { border-color: rgba(201,168,76,0.5); }
  .bio-current-label { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 1px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 4px; }
  .bio-select {
    width: 100%; background: rgba(0,0,0,0.5); border: 1px solid rgba(201,168,76,0.2);
    color: var(--text); font-family: 'Crimson Text', serif; font-size: 13px;
    padding: 4px 6px; border-radius: 2px; outline: none;
  }
  .bio-select:focus { border-color: rgba(201,168,76,0.5); }
  .bio-item-row { display: flex; align-items: center; gap: 6px; margin-top: 6px; padding: 4px 0; border-top: 1px solid rgba(201,168,76,0.15); }
  .bio-item-icon { width: 22px; height: 22px; object-fit: contain; }
  .bio-item-name { font-size: 13px; color: var(--text); flex: 1; }
  .bio-item-qty { font-family: 'Cinzel', serif; font-size: 10px; color: var(--text-dim); }
  .bio-done-today {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 10px; border-radius: 2px; margin-top: 4px;
    font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 1px;
    background: rgba(40,120,40,0.2); border: 1px solid rgba(60,180,60,0.4);
    color: #70e070;
  }
  .bio-done-today.unchecked {
    background: rgba(60,40,10,0.2); border-color: rgba(140,100,20,0.35);
    color: var(--text-dim);
  }
  .bio-oddaj-btn {
    font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
    padding: 5px 14px; border-radius: 2px; cursor: pointer; transition: all 0.2s;
    border: 1px solid rgba(201,168,76,0.3); color: var(--gold-dark);
    background: rgba(201,168,76,0.07); margin-top: 4px; width: 100%;
  }
  .bio-oddaj-btn:hover { color: var(--gold); border-color: rgba(201,168,76,0.6); background: rgba(201,168,76,0.15); }
  .bio-panel.done-ok .bio-oddaj-btn  { border-color: rgba(60,180,60,0.4); color: #60c060; background: rgba(40,120,40,0.1); }
  .bio-panel.done-fail .bio-oddaj-btn { border-color: rgba(180,60,60,0.4); color: #c06060; background: rgba(120,40,40,0.1); }
  .bio-total { font-size: 11px; color: var(--text-dim); font-style: italic; margin-top: 2px; }

  /* KAMIEŃ DUCHOWY */
  .stone-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 8px; margin-bottom: 4px; border-radius: 2px;
    background: rgba(60,20,80,0.25); border: 1px solid rgba(140,80,200,0.3);
    transition: background 0.2s;
  }
  .stone-left { display: flex; align-items: center; gap: 8px; }
  .stone-icon { width: 20px; height: 20px; font-size: 18px; line-height: 1; }
  .stone-name { font-size: 14px; color: #c0a0e0; }
  .stone-timer { font-family: 'Cinzel', serif; font-size: 12px; color: var(--text-dim); margin-top: 2px; letter-spacing: 1px; }
  .stone-timer.done { color: #a060e0; font-weight: 600; }
  .stone-btn {
    font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 1px; text-transform: uppercase;
    color: #9060c0; background: rgba(120,60,180,0.1);
    border: 1px solid rgba(140,80,200,0.35); border-radius: 2px;
    padding: 4px 10px; cursor: pointer; transition: all 0.2s;
  }
  .stone-btn:hover { color: #c080ff; border-color: rgba(180,100,255,0.7); background: rgba(120,60,180,0.22); }

  /* MODAL KAMIENIA */
  .stone-modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
  }
  .stone-modal-overlay.hidden { display: none; }
  .stone-modal-box {
    background: linear-gradient(160deg,#1a1020,#0d0810);
    border: 1px solid rgba(140,80,200,0.5); border-radius: 4px;
    padding: 30px 36px; width: 320px; text-align: center;
    box-shadow: 0 0 60px rgba(0,0,0,0.9), 0 0 30px rgba(120,60,180,0.15);
    position: relative;
  }
  .stone-modal-box::before, .stone-modal-box::after {
    content:''; position:absolute; width:14px; height:14px;
    border-color: rgba(140,80,200,0.5); border-style:solid;
  }
  .stone-modal-box::before { top:7px; left:7px; border-width:1px 0 0 1px; }
  .stone-modal-box::after  { bottom:7px; right:7px; border-width:0 1px 1px 0; }
  .stone-modal-title { font-family:'Cinzel',serif; font-size:13px; letter-spacing:3px; color:#c080ff; text-transform:uppercase; margin-bottom:6px; }
  .stone-modal-char  { font-size:14px; color:var(--text-dim); font-style:italic; margin-bottom:20px; }
  .stone-modal-label { font-family:'Cinzel',serif; font-size:9px; letter-spacing:2px; color:var(--text-dim); text-transform:uppercase; margin-bottom:8px; }
  .stone-modal-input {
    width:100%; background:rgba(0,0,0,0.6);
    border:1px solid rgba(140,80,200,0.3); border-radius:2px;
    color:#c0a0e0; font-family:'Cinzel',serif; font-size:18px;
    letter-spacing:2px; text-align:center;
    padding:10px 14px; outline:none; margin-bottom:16px;
    transition:border-color 0.2s;
  }
  .stone-modal-input:focus { border-color:rgba(180,100,255,0.7); }
  .stone-modal-hint { font-size:12px; color:var(--text-dim); font-style:italic; margin-bottom:18px; }
  .stone-modal-confirm {
    width:100%; font-family:'Cinzel',serif; font-size:11px; letter-spacing:3px; text-transform:uppercase;
    padding:11px; background:rgba(120,60,180,0.15); border:1px solid rgba(140,80,200,0.5);
    border-radius:2px; color:#c080ff; cursor:pointer; transition:all 0.25s; margin-bottom:8px;
  }
  .stone-modal-confirm:hover { background:rgba(120,60,180,0.3); border-color:rgba(180,100,255,0.8); box-shadow:0 0 16px rgba(120,60,180,0.3); }
  .stone-modal-cancel {
    width:100%; font-family:'Cinzel',serif; font-size:9px; letter-spacing:2px; text-transform:uppercase;
    color:var(--text-dim); background:none; border:1px solid rgba(255,255,255,0.08);
    border-radius:2px; padding:7px; cursor:pointer; transition:all 0.2s;
  }
  .stone-modal-cancel:hover { color:var(--text); border-color:rgba(255,255,255,0.2); }

  /* MODAL HASŁA */
  .auth-overlay {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(5,4,3,0.92);
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(6px);
    transition: opacity 0.4s;
  }
  .auth-overlay.hidden { opacity: 0; pointer-events: none; }

  .auth-box {
    position: relative;
    background: linear-gradient(160deg, #1e1810, #100d08);
    border: 1px solid var(--gold-dark);
    border-radius: 4px;
    padding: 40px 44px;
    width: 360px;
    text-align: center;
    box-shadow: 0 0 80px rgba(0,0,0,0.9), 0 0 40px rgba(201,168,76,0.08);
  }
  .auth-box::before, .auth-box::after {
    content: ''; position: absolute; width: 18px; height: 18px;
    border-color: rgba(201,168,76,0.5); border-style: solid;
  }
  .auth-box::before { top: 8px; left: 8px; border-width: 1px 0 0 1px; }
  .auth-box::after  { bottom: 8px; right: 8px; border-width: 0 1px 1px 0; }

  .auth-ornament {
    display: flex; align-items: center; gap: 10px; justify-content: center; margin-bottom: 20px;
  }
  .auth-ornament::before, .auth-ornament::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(to right, transparent, var(--gold-dark));
  }
  .auth-ornament::after { background: linear-gradient(to left, transparent, var(--gold-dark)); }
  .auth-diamond { width: 7px; height: 7px; background: var(--gold); transform: rotate(45deg); box-shadow: 0 0 8px rgba(201,168,76,0.6); }

  .auth-title {
    font-family: 'Cinzel', serif; font-size: 13px; letter-spacing: 4px;
    color: var(--gold-light); text-transform: uppercase; margin-bottom: 6px;
  }
  .auth-sub {
    font-size: 14px; color: var(--text-dim); font-style: italic; margin-bottom: 28px;
  }

  .auth-input-wrap { position: relative; margin-bottom: 10px; }
  .auth-input {
    width: 100%; background: rgba(0,0,0,0.6);
    border: 1px solid rgba(201,168,76,0.25); border-radius: 2px;
    color: var(--text); font-family: 'Cinzel', serif; font-size: 16px;
    letter-spacing: 4px; text-align: center;
    padding: 12px 16px; outline: none;
    transition: border-color 0.25s, box-shadow 0.25s;
  }
  .auth-input:focus { border-color: rgba(201,168,76,0.6); box-shadow: 0 0 16px rgba(201,168,76,0.1); }
  .auth-input.error { border-color: rgba(200,50,50,0.8); box-shadow: 0 0 16px rgba(200,50,50,0.15); animation: shake 0.35s ease; }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%     { transform: translateX(-8px); }
    60%     { transform: translateX(8px); }
  }
  .auth-error { font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 2px; color: #cc4444; height: 16px; margin-bottom: 16px; transition: opacity 0.2s; }

  .auth-btn {
    width: 100%; font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 4px;
    text-transform: uppercase; padding: 12px;
    background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.4);
    border-radius: 2px; color: var(--gold); cursor: pointer;
    transition: all 0.25s;
  }
  .auth-btn:hover { background: rgba(201,168,76,0.2); border-color: var(--gold); box-shadow: 0 0 20px rgba(201,168,76,0.15); }
  .auth-btn:active { transform: scale(0.98); }

  /* ukryj zawartość dopóki niezalogowany */
  .page-content { transition: opacity 0.4s; }
  .page-content.locked { opacity: 0; pointer-events: none; user-select: none; }
</style>
</head>

<div class="main">
  <div class="ornament-line"><div class="ornament-diamond"></div></div>
  <div class="page-title">Postacie Gildii</div>
  <div class="char-mgmt-bar">
    <input class="char-mgmt-input" id="newCharName" placeholder="Nazwa postaci..." maxlength="30">
    <select class="icon-select" id="newCharIcon">
      <option value="/icons/warrior.png">⚔ Wojownik</option>
      <option value="/icons/warriorw.png">⚔ Wojowniczka</option>
      <option value="/icons/ninja.png">🥷 Ninja</option>
      <option value="/icons/ninjaw.png">🥷 Ninjka</option>
      <option value="/icons/shaman.png">🔮 Szaman</option>
      <option value="/icons/shamanm.png">🔮 Szamanka</option>
      <option value="/icons/sura.png">🗡 Sura</option>
      <option value="/icons/sura_w.png">🗡 Sura (w)</option>
    </select>
    <button class="char-mgmt-btn" onclick="addNewChar()">+ Dodaj postać</button>
  </div>
  <div class="char-grid" id="characters"></div>

<script>
const socket = io();

/* === AUTORYZACJA === */
const authOverlay = document.getElementById('authOverlay');
const pageContent = document.getElementById('pageContent');
const authInput   = document.getElementById('authInput');
const authError   = document.getElementById('authError');

// Sprawdź czy hasło zapisane w sessionStorage
if (localStorage.getItem('auth') === '1') {
  unlock();
}

authInput.addEventListener('keydown', e => { if (e.key === 'Enter') submitPassword(); });
// Fokus na input po załadowaniu
setTimeout(() => authInput.focus(), 100);

function submitPassword() {
  const pass = authInput.value;
  socket.emit('checkPassword', pass, ok => {
    if (ok) {
      localStorage.setItem('auth', '1');
      unlock();
    } else {
      authInput.classList.add('error');
      authError.innerText = 'Nieprawidłowe hasło';
      setTimeout(() => { authInput.classList.remove('error'); authError.innerText = ''; }, 1500);
      authInput.value = '';
      authInput.focus();
    }
  });
}

function unlock() {
  authOverlay.classList.add('hidden');
  pageContent.classList.remove('locked');
  // po animacji całkiem ukryj overlay
  setTimeout(() => { authOverlay.style.display = 'none'; }, 400);
}

let chars = {
  Medal:             '/icons/warrior.png',
  Bieluszek:         '/icons/ninja.png',
  Pojara:            '/icons/shaman.png',
  Suczka:            '/icons/shaman.png',
  Czantorianka:      '/icons/shaman.png',
  EwaZajączkowska:   '/icons/warriorw.png',
  Yodasz:            '/icons/sura.png'
};
const icons = {
  KU:    '/icons/skillbook.png',
  Poly:  '/icons/polymorph.png',
  Bio:   '/icons/orctooth.png',
  Medal: '/icons/horsemedal.png',
  Dow:   '/icons/skillbook.png'
};
function getIcon(task) {
  if (task.startsWith('KU')) return icons.KU;
  if (task === 'Polymorph')  return icons.Poly;
  if (task === 'Biolog')     return icons.Bio;
  if (task === 'Medal')      return icons.Medal;
  if (task === 'Dowodzenie') return icons.Dow;
  return icons.KU;
}

const container  = document.getElementById('characters');
const checkboxes = {};
const medalTimers   = {};
const medalIntervals = {};
const hasMedal = ['Medal','Bieluszek','Pojara','Czantorianka','Yodasz'];

/* BIOLOG — lista przedmiotów */
const BIOLOG_ITEMS = [
  { id:'zab_orka',      name:'Ząb Orka',               qty:10, img:'https://pl-wiki.metin2.gameforge.com/images/4/4e/Z%C4%85b_Orka.png' },
  { id:'ksiega_klatw',  name:'Księga Klątw',            qty:15, img:'https://pl-wiki.metin2.gameforge.com/images/c/c0/Ksi%C4%99ga_Kl%C4%85tw.png' },
  { id:'pamiatka',      name:'Pamiątka po Demonie',     qty:15, img:'https://pl-wiki.metin2.gameforge.com/images/4/4d/Pami%C4%85tka_Po_Demonie.png' },
  { id:'matowy_lod',    name:'Matowy Lód',              qty:20, img:'https://pl-wiki.metin2.gameforge.com/images/4/4b/Matowy_L%C3%B3d.png' },
  { id:'konar_zelkova', name:'Konar Zelkova',           qty:25, img:'https://pl-wiki.metin2.gameforge.com/images/7/7e/Konar_Zelkova.jpg' },
  { id:'certyfikat',    name:'Certyfikat Tugyisa',      qty:30, img:'https://pl-wiki.metin2.gameforge.com/images/9/9f/Certyfikat_Tugyisa.png' },
  { id:'czerw_konar',   name:'Czerwony Konar Duchodrzewa', qty:35, img:'https://pl-wiki.metin2.gameforge.com/images/e/e3/Czerwony_Konar_Duchodrzewa.png' },
  { id:'notatka',       name:'Notatka Przywódcy',       qty:50, img:'https://pl-wiki.metin2.gameforge.com/images/7/7b/Notatka_Lidera.png' },
  { id:'klejnot_m',     name:'Klejnot Mądrości',        qty:10, img:'https://pl-wiki.metin2.gameforge.com/images/d/d9/Klejnot_M%C4%85dro%C5%9Bci.png' },
  { id:'klejnot_w',     name:'Klejnot Wierności',       qty:20, img:'https://pl-wiki.metin2.gameforge.com/images/3/39/Klejnot_Wierno%C5%9Bci.png' },
];

const stoneTimers   = {}; // key = char+'_'+stoneId
const stoneIntervals = {};

/* ═══ UNIVERSAL INIT MODAL ═══ */
let initModalCallback = null;

function openInitModal(title, sub, fields, onConfirm) {
  // fields: [{id, label, type, placeholder, value}]
  document.getElementById('initModalTitle').innerText = title;
  document.getElementById('initModalSub').innerText = sub;
  const wrap = document.getElementById('initModalFields');
  wrap.innerHTML = fields.map(f => `
    <div style="margin-bottom:12px">
      <div class="stone-modal-label" style="margin-bottom:6px">${f.label}</div>
      <input class="stone-modal-input" id="initField_${f.id}"
        type="${f.type||'text'}" placeholder="${f.placeholder||''}"
        value="${f.value||''}">
    </div>`).join('');
  initModalCallback = onConfirm;
  document.getElementById('initModal').classList.remove('hidden');
  setTimeout(() => { const first = wrap.querySelector('input'); if(first) first.focus(); }, 50);
}
function closeInitModal() {
  document.getElementById('initModal').classList.add('hidden');
  initModalCallback = null;
}
function confirmInitModal() {
  if (!initModalCallback) return;
  const wrap = document.getElementById('initModalFields');
  const vals = {};
  wrap.querySelectorAll('input').forEach(inp => { vals[inp.id.replace('initField_','')] = inp.value; });
  initModalCallback(vals);
  closeInitModal();
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeInitModal();
  if (e.key === 'Enter' && initModalCallback) confirmInitModal();
});

/* OPEN STONE TIMER MODAL (for existing stone row) */
function openStoneModal(char, stoneId) {
  openInitModal(
    '💎 Kamień Duchowy',
    char + (stoneId ? ' — ' + stoneId : ''),
    [{ id:'hours', label:'Za ile godzin można oddać następny?', type:'number', placeholder:'np. 24' }],
    vals => {
      const hours = parseFloat(vals.hours);
      if (!hours || hours <= 0) return;
      socket.emit('spiritStone', { char, stoneId, hours });
    }
  );
}

/* SPIRIT STONE COUNTDOWN — timerId = char_stoneId */
function startStoneTimer(timerId, el, end) {
  if (stoneIntervals[timerId]) clearInterval(stoneIntervals[timerId]);
  function tick() {
    const diff = end - Date.now();
    if (diff <= 0) {
      el.innerText = 'GOTOWE'; el.className = 'stone-timer done';
      clearInterval(stoneIntervals[timerId]); return;
    }
    const h = Math.floor(diff/3600000);
    const m = Math.floor((diff%3600000)/60000);
    const s = Math.floor((diff%60000)/1000);
    el.innerText = String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
    el.className = 'stone-timer';
  }
  tick();
  stoneIntervals[timerId] = setInterval(tick, 1000);
}

/* CLOCK */
function updateClock() {
  const pl = new Date(new Date().toLocaleString('en-US', { timeZone: 'Europe/Warsaw' }));
  document.getElementById('clock').innerText =
    String(pl.getHours()).padStart(2,'0')+':'+
    String(pl.getMinutes()).padStart(2,'0')+':'+
    String(pl.getSeconds()).padStart(2,'0');
}
setInterval(updateClock, 1000); updateClock();

/* MEDAL COUNTDOWN */
function startMedalTimer(char, el, end) {
  if (medalIntervals[char]) clearInterval(medalIntervals[char]);
  function tick() {
    const diff = end - Date.now();
    if (diff <= 0) {
      el.innerText = 'GOTOWE'; el.className = 'medal-timer medal-done';
      clearInterval(medalIntervals[char]); return;
    }
    const h = Math.floor(diff/3600000);
    const m = Math.floor((diff%3600000)/60000);
    const s = Math.floor((diff%60000)/1000);
    el.innerText = String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
    el.className = 'medal-timer';
  }
  tick();
  medalIntervals[char] = setInterval(tick, 1000);
}

/* CREATE TASK ROW — shared by both init and dynamic add */
function createTaskRow(char, name) {
  const row = document.createElement('div');
  row.className = 'task-row';
  row.id = 'task_' + char + '_' + name;

  const left = document.createElement('div');
  left.className = 'task-left';
  // KU tasks get editable label
  const isKU = /^KU\d*$/.test(name);
  if (isKU) {
    const img = document.createElement('img');
    img.className = 'task-icon'; img.src = getIcon(name);
    const span = document.createElement('span');
    span.className = 'task-name task-name-editable';
    span.title = 'Kliknij aby zmienić nazwę';
    const savedName = localStorage.getItem('ku_name_' + char + '_' + name) || name;
    span.innerText = savedName;
    span.onclick = (e) => {
      e.stopPropagation();
      const input = document.createElement('input');
      input.className = 'task-name-input';
      input.value = span.innerText;
      span.replaceWith(input);
      input.focus(); input.select();
      function finish() {
        const val = input.value.trim() || name;
        span.innerText = val;
        localStorage.setItem('ku_name_' + char + '_' + name, val);
        input.replaceWith(span);
      }
      input.onblur = finish;
      input.onkeydown = (ev) => { if(ev.key==='Enter') finish(); if(ev.key==='Escape'){ input.value=span.innerText; finish(); } };
    };
    left.append(img, span);
  } else {
    left.innerHTML = `<img class="task-icon" src="${getIcon(name)}"><span class="task-name">${name}</span>`;
  }

  const cb = document.createElement('input');
  cb.type = 'checkbox'; cb.className = 'task-cb';
  cb.onchange = () => {
    row.classList.toggle('done', cb.checked);
    socket.emit('toggleTask', { char, task: name, value: cb.checked });
  };
  checkboxes[char + '_' + name] = cb;

  const rmBtn = document.createElement('button');
  rmBtn.className = 'remove-btn'; rmBtn.innerText = '✕';
  rmBtn.onclick = () => {
    delete checkboxes[char + '_' + name];
    row.remove();
    socket.emit('removeTask', { char, task: name });
  };

  const right = document.createElement('div');
  right.className = 'task-right';
  right.append(cb, rmBtn);
  row.append(left, right);
  return row;
}

/* MEDAL ROW */
function buildMedalRow(char, horseLevel) {
  const row = document.createElement('div');
  row.className = 'medal-row';
  row.id = 'medalrow_' + char;

  const levelEl = document.createElement('span');
  levelEl.id = 'horselevel_' + char;
  levelEl.style.cssText = 'font-family:Cinzel,serif;font-size:10px;color:var(--gold-dark);letter-spacing:1px;cursor:pointer;border-bottom:1px dashed rgba(201,168,76,0.3);padding:0 2px;';
  levelEl.title = 'Kliknij aby zmienić level';
  levelEl.innerText = 'Lv ' + (horseLevel || 0);
  levelEl.onclick = () => {
    openInitModal(
      '🏅 Medal Konny',
      char + ' — zmień level konia',
      [{ id:'level', label:'Aktualny level konia', type:'number', value: horseLevel||0 }],
      vals => {
        const lv = parseInt(vals.level) || 0;
        socket.emit('setHorseLevel', { char, level: lv });
      }
    );
  };

  row.innerHTML = `
    <div class="medal-left">
      <img class="task-icon" src="${icons.Medal}">
      <div>
        <div style="display:flex;align-items:center;gap:6px;">Medal konny <span id="horselevel_${char}_placeholder"></span></div>
        <div class="medal-timer" id="mt_${char}">—</div>
      </div>
    </div>
    <div style="display:flex;gap:6px;align-items:center;">
      <button class="give-btn" id="givebtn_${char}" onclick="giveMedal('${char}')">Oddaj</button>
      <button class="remove-btn" onclick="removeMedal('${char}')" title="Usuń">✕</button>
    </div>
  `;
  row.querySelector('#horselevel_' + char + '_placeholder').replaceWith(levelEl);
  medalTimers[char] = row.querySelector('#mt_' + char) || row.querySelector('.medal-timer');
  return row;
}

function addMedalRow(bodyEl, char) {
  bodyEl.appendChild(buildMedalRow(char, 0));
}

function removeMedal(char) {
  const row = document.getElementById('medalrow_' + char);
  if (row) row.remove();
  if (medalIntervals[char]) { clearInterval(medalIntervals[char]); delete medalIntervals[char]; }
  delete medalTimers[char];
  socket.emit('removeMedal', char);
}

/* SPIRIT STONE ROW */
/* BIOLOG EXPANDED ROW */
function buildBioRow(char, data) {
  const bioCurrent   = data.bioCurrent   || null;
  const bioDoneToday = data.bioDoneToday || 0;
  const bioDoneTotal = data.bioDoneTotal || 0;
  const bioChecked   = data.bioDoneChecked || false;

  const row = document.createElement('div');
  const bioTried = data.bioTriedToday || false;
  row.className = 'bio-panel' + (bioChecked ? ' done-ok' : bioTried ? ' done-fail' : '');
  row.id = 'biorow_' + char;

  const opts = BIOLOG_ITEMS.map(i =>

function buildStoneRow(char, stoneId, stoneName, timerEnd, skillLevel) {
  const domId   = 'stonerow_' + char + '_' + stoneId;
  const timerId  = char + '_' + stoneId;
  const row      = document.createElement('div');
  row.className  = 'stone-row';
  row.id         = domId;

  // editable name
  const nameSpan = document.createElement('span');
  nameSpan.className = 'stone-name task-name-editable';
  nameSpan.title = 'Kliknij aby zmienić nazwę';
  nameSpan.innerText = stoneName || stoneId;
  nameSpan.onclick = () => {
    const inp = document.createElement('input');
    inp.className = 'task-name-input'; inp.value = nameSpan.innerText;
    nameSpan.replaceWith(inp); inp.focus(); inp.select();
    function finish() {
      const val = inp.value.trim() || stoneId;
      nameSpan.innerText = val; inp.replaceWith(nameSpan);
      socket.emit('renameStone', { char, stoneId, name: val });
    }
    inp.onblur = finish;
    inp.onkeydown = ev => { if(ev.key==='Enter') finish(); if(ev.key==='Escape'){ inp.value=nameSpan.innerText; finish(); } };
  };

  // editable skill level
  const levelSpan = document.createElement('span');
  levelSpan.id = 'stonelevel_' + char + '_' + stoneId;
  levelSpan.style.cssText = 'font-family:Cinzel,serif;font-size:10px;color:#9060c0;letter-spacing:1px;cursor:pointer;border-bottom:1px dashed rgba(140,80,200,0.35);padding:0 2px;margin-left:4px;';
  levelSpan.title = 'Kliknij aby zmienić level skilla';
  levelSpan.innerText = 'G' + (skillLevel || 0);
  levelSpan.onclick = () => {
    openInitModal(
      '💎 Kamień Duchowy',
      char + ' — ' + (nameSpan.innerText),
      [{ id:'level', label:'Aktualny level skilla (G)', type:'number', value: skillLevel||0, placeholder:'np. 5' }],
      vals => {
        const lv = parseInt(vals.level) || 0;
        levelSpan.innerText = 'G' + lv;
        skillLevel = lv;
        socket.emit('setStoneSkillLevel', { char, stoneId, level: lv });
      }
    );
  };

  const timerEl = document.createElement('div');
  timerEl.className = 'stone-timer';
  timerEl.id = 'st_stone_' + char + '_' + stoneId;
  timerEl.innerText = '—';

  const left = document.createElement('div');
  left.className = 'stone-left';
  const img = document.createElement('img');
  img.className = 'task-icon'; img.src = '/kamien_duchowy.png';
  img.style.cssText = 'width:22px;height:22px;object-fit:contain;';
  const textWrap = document.createElement('div');
  const nameRow = document.createElement('div');
  nameRow.style.cssText = 'display:flex;align-items:center;gap:2px;';
  nameRow.append(nameSpan, levelSpan);
  textWrap.append(nameRow, timerEl);
  left.append(img, textWrap);

  const right = document.createElement('div');
  right.style.cssText = 'display:flex;gap:6px;align-items:center;';
  right.innerHTML = `
    <button class="stone-btn" onclick="openStoneModal('${char}','${stoneId}')">Ustaw</button>
    <button class="remove-btn" onclick="removeStone('${char}','${stoneId}')" title="Usuń">✕</button>`;

  row.append(left, right);
  stoneTimers[timerId] = timerEl;
  if (timerEnd) startStoneTimer(timerId, timerEl, timerEnd);
  return row;
}

function addTask(char) {
  const sel = document.getElementById('tsel_' + char);
  const task = sel.value;
  // Special handling for medal — ask for horse level
  if (task === '__medal__') {
    if (document.getElementById('medalrow_' + char)) return;
    openInitModal(
      '🏅 Medal Konny',
      'Dodaj do: ' + char,
      [{ id:'level', label:'Aktualny level konia', type:'number', placeholder:'np. 15', value:'' }],
      vals => {
        const level = parseInt(vals.level) || 0;
        socket.emit('addMedal', { char, level });
      }
    );
    return;
  }
  // Special handling for biolog
  if (task === '__bio__') {
    if (document.getElementById('biorow_' + char)) return;
    openInitModal(
      '🌿 Biolog',
      'Dodaj do: ' + char,
      [
        { id:'total', label:'Ile sztuk już oddano łącznie?', type:'number', placeholder:'np. 12', value:'' },
        { id:'current', label:'Aktualny przedmiot (wybierz po dodaniu)', placeholder:'', value:'' }
      ],
      vals => {
        const total = parseInt(vals.total) || 0;
        const panel = document.getElementById('addpanel_' + char);
        panel.parentElement.insertBefore(buildBioRow(char, { bioDoneTotal: total, bioCurrent: null, bioDoneToday: 0, bioDoneChecked: false }), panel);
        socket.emit('updateBio', { char, current: null, doneTotal: total, doneToday: 0 });
      }
    );
    return;
  }
  // Special handling for spirit stone — ask for name
  if (task === '__stone__') {
    openInitModal(
      '💎 Kamień Duchowy',
      'Dodaj do: ' + char,
      [
        { id:'name', label:'Nazwa skilla (np. Miecz, Tarcza)', placeholder:'np. Miecz' },
        { id:'level', label:'Aktualny level skilla (G)', type:'number', placeholder:'np. 5', value:'' }
      ],
      vals => {
        const name  = vals.name.trim() || 'Kamień';
        const level = parseInt(vals.level) || 0;
        const stoneId = 'stone_' + Date.now();
        socket.emit('addStone', { char, stoneId, name, skillLevel: level });
      }
    );
    return;
  }
  if (document.getElementById('task_' + char + '_' + task)) return;
  const panel = document.getElementById('addpanel_' + char);
  panel.parentElement.insertBefore(createTaskRow(char, task), panel);
  socket.emit('addTask', { char, task });
}

/* ═══ DRAG & DROP — order chars ═══ */
let dragSrc = null;

function initDrag(card) {
  card.setAttribute('draggable', 'true');

  card.addEventListener('dragstart', e => {
    dragSrc = card;
    card.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', card.dataset.char);
  });

  card.addEventListener('dragend', () => {
    card.classList.remove('dragging');
    document.querySelectorAll('.char-card').forEach(c => c.classList.remove('drag-over'));
  });

  card.addEventListener('dragover', e => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    if (card !== dragSrc) {
      document.querySelectorAll('.char-card').forEach(c => c.classList.remove('drag-over'));
      card.classList.add('drag-over');
    }
  });

  card.addEventListener('dragleave', () => {
    card.classList.remove('drag-over');
  });

  card.addEventListener('drop', e => {
    e.preventDefault();
    card.classList.remove('drag-over');
    if (!dragSrc || dragSrc === card) return;

    const grid = container;
    const cards = [...grid.querySelectorAll('.char-card')];
    const srcIdx = cards.indexOf(dragSrc);
    const dstIdx = cards.indexOf(card);

    if (srcIdx < dstIdx) {
      grid.insertBefore(dragSrc, card.nextSibling);
    } else {
      grid.insertBefore(dragSrc, card);
    }

    saveCharOrder();
  });
}

function saveCharOrder() {
  const order = [...container.querySelectorAll('.char-card')].map(c => c.dataset.char);
  socket.emit('setCharOrder', order);
}

function applyCharOrder(order) {
  if (!order || order.length === 0) return;
  const grid = container;
  order.forEach(charName => {
    const card = grid.querySelector(`.char-card[data-char="${charName}"]`);
    if (card) grid.appendChild(card); // move to end in order
  });
}

/* TASKS FROM SERVER — renders task list from data.json on connect and after any change */
function applyTasksData(data) {
  for (const char in data) {
    const body  = document.getElementById('body_' + char);
    const panel = document.getElementById('addpanel_' + char);
    if (!body || !panel) continue;

    body.querySelectorAll('.task-row').forEach(row => {
      const taskName = row.id.replace('task_' + char + '_', '');
      if (!data[char].includes(taskName)) {
        delete checkboxes[char + '_' + taskName];
        row.remove();
      }
    });

    data[char].forEach(task => {
      if (!document.getElementById('task_' + char + '_' + task)) {
        body.insertBefore(createTaskRow(char, task), panel);
      }
    });

    if (lastCharData[char]) {
      const charState = lastCharData[char];
      for (const task in charState) {
        if (SKIP_KEYS && SKIP_KEYS.has(task)) continue;
        const row = document.getElementById('task_' + char + '_' + task);
        if (!row) continue;
        const cb = checkboxes[char + '_' + task];
        if (cb) { cb.checked = !!charState[task]; row.classList.toggle('done', !!charState[task]); }
      }
    }
  }
  if (window._savedCharOrder) applyCharOrder(window._savedCharOrder);
}

socket.on('tasksUpdate', data => {
  const anyCard = document.querySelector('.char-card');
  if (!anyCard) { window._pendingTasksData = data; return; }
  applyTasksData(data);
});

/* CHECKBOXES + MEDAL TIMER STATE FROM SERVER */
const SKIP_KEYS = new Set(['horseTimer','spiritStoneTimer','hasStone','hasMedal','bioCurrent',
  'bioDoneToday','bioDoneTotal','bioDoneChecked','bioTriedToday','stones','horseLevel','medalGivenToday']);

let lastCharData = {};

function applyCharsData(data) {
  lastCharData = data;
  for (const char in data) {
    const tasks = data[char];
    for (const task in tasks) {
      if (SKIP_KEYS.has(task)) continue;
      // Only update checkboxes for task rows that actually exist in DOM
      const row = document.getElementById('task_' + char + '_' + task);
      if (!row) continue;
      const cb = checkboxes[char + '_' + task];
      if (cb) {
        cb.checked = !!tasks[task];
        row.classList.toggle('done', !!tasks[task]);
      }
    }
    // Show/hide medal row based on server state
    const medalRow = document.getElementById('medalrow_' + char);
    if (tasks.hasMedal && !medalRow) {
      const panel = document.getElementById('addpanel_' + char);
      if (panel) {
        panel.parentElement.insertBefore(buildMedalRow(char, tasks.horseLevel||0), panel);
        // Od razu ustaw stan givenToday jeśli wiemy
        const newRow = document.getElementById('medalrow_' + char);
        const newBtn = document.getElementById('givebtn_' + char);
        const givenNow = !!tasks.medalGivenToday;
        if (newRow) newRow.classList.toggle('done-today', givenNow);
        if (newBtn) {
          newBtn.disabled = givenNow;
          newBtn.style.opacity = givenNow ? '0.4' : '1';
          newBtn.style.cursor  = givenNow ? 'default' : 'pointer';
          newBtn.innerText = givenNow ? '✔ Oddano' : 'Oddaj';
        }
      }
    } else if (!tasks.hasMedal && medalRow) {
      medalRow.remove();
      if (medalIntervals[char]) { clearInterval(medalIntervals[char]); delete medalIntervals[char]; }
      delete medalTimers[char];
    } else if (tasks.hasMedal && medalRow) {
      const lvEl = document.getElementById('horselevel_' + char);
      if (lvEl && tasks.horseLevel !== undefined) lvEl.innerText = 'Lv ' + tasks.horseLevel;
    }
    // Medal given today — zielona ramka + zablokowany przycisk
    if (medalRow) {
      const giveBtn = document.getElementById('givebtn_' + char);
      const givenToday = !!tasks.medalGivenToday;
      medalRow.classList.toggle('done-today', givenToday);
      if (giveBtn) {
        giveBtn.disabled = givenToday;
        giveBtn.style.opacity = givenToday ? '0.4' : '1';
        giveBtn.style.cursor  = givenToday ? 'default' : 'pointer';
        giveBtn.innerText = givenToday ? '✔ Oddano' : 'Oddaj';
      }
    }
    // Bio done today — zielona ramka
    const bioRow = document.getElementById('biorow_' + char);
    // Start medal timer AFTER row is guaranteed in DOM
    if (tasks.horseTimer && medalTimers[char]) {
      startMedalTimer(char, medalTimers[char], tasks.horseTimer);
    }
    // Multi-stone sync
    const serverStones = tasks.stones || {};
    // Remove stones no longer on server
    document.querySelectorAll('[id^="stonerow_' + char + '_"]').forEach(el => {
      const sid = el.id.replace('stonerow_' + char + '_', '');
      if (!serverStones[sid]) {
        el.remove();
        const tid = char + '_' + sid;
        if (stoneIntervals[tid]) { clearInterval(stoneIntervals[tid]); delete stoneIntervals[tid]; }
        delete stoneTimers[tid];
      }
    });
    // Add/update stones from server
    for (const sid in serverStones) {
      const st = serverStones[sid];
      const domId = 'stonerow_' + char + '_' + sid;
      const timerId = char + '_' + sid;
      if (!document.getElementById(domId)) {
        const panel = document.getElementById('addpanel_' + char);
        if (panel) panel.parentElement.insertBefore(buildStoneRow(char, sid, st.name, st.timerEnd, st.skillLevel||0), panel);
      } else {
        // update timer
        const timerEl = document.getElementById('st_stone_' + char + '_' + sid);
        if (timerEl && st.timerEnd) startStoneTimer(timerId, timerEl, st.timerEnd);
      }
    }
    // Biolog panel sync
    if (bioRow) {
      bioRow.classList.remove('done-ok','done-fail');
      if (tasks.bioDoneChecked) bioRow.classList.add('done-ok');
      else if (tasks.bioTriedToday) bioRow.classList.add('done-fail');
    }
    const hasBioData = tasks.bioCurrent != null || (tasks.bioDoneTotal || 0) > 0;
    if (hasBioData && !bioRow) {
      const panel = document.getElementById('addpanel_' + char);
      if (panel) panel.parentElement.insertBefore(buildBioRow(char, tasks), panel);
    } else if (!hasBioData && bioRow) {
      bioRow.remove();
    } else if (hasBioData && bioRow) {
      // update selectively without full rebuild
      const sel    = document.getElementById('biosel_'    + char);

      const total  = document.getElementById('biototal_'  + char);
      if (sel && tasks.bioCurrent !== undefined && sel.value !== (tasks.bioCurrent||'')) {
        sel.value = tasks.bioCurrent || '';
        updateBioItem(char, tasks.bioCurrent);
      }
      const btn = document.getElementById('biobtn_' + char);
      if (btn) {
        const checked  = tasks.bioDoneChecked;
        const tried    = tasks.bioTriedToday;
        const blocked  = checked || tried;
        btn.disabled = blocked;
        btn.style.opacity = blocked ? '0.4' : '1';
        btn.style.cursor  = blocked ? 'default' : 'pointer';
        btn.innerText = checked ? '✔ Oddano' : (tried ? '✕ Niepomyślnie' : '+ Oddaj');
      }
      if (total) total.innerText = `Łącznie oddane: ${tasks.bioDoneTotal||0} szt.`;
    }
  }
}

  // Usuń karty których już nie ma na liście
  document.querySelectorAll('.char-card').forEach(card => {
    if (!data[card.dataset.char]) {
      card.remove();
      delete chars[card.dataset.char];
    }
  });
  if (window._savedCharOrder) applyCharOrder(window._savedCharOrder);

  // Po zbudowaniu kart — aplikuj zapisane dane tasks i characters
  if (window._pendingTasksData)      applyTasksData(window._pendingTasksData);
  if (window._pendingCharsData)      applyCharsData(window._pendingCharsData);
  window._pendingTasksData = null;
  window._pendingCharsData = null;
});

socket.on('resetTime', data => {
  document.getElementById('resetDisplay').innerText =
    String(data.hour).padStart(2,'0') + ':' + String(data.minute).padStart(2,'0');
  document.getElementById('resetHour').value   = data.hour;
  document.getElementById('resetMinute').value = data.minute;
});
</script>
<!-- KALKULATOR ELIKSIRÓW -->
<div class="elix-panel" id="elixPanel">
  <div class="elix-header" onclick="toggleElix()">
    <span class="elix-header-title">⚗ Kalkulator Eliksirów</span>
    <span class="elix-toggle">▲</span>
  </div>
  <div class="elix-body">

    <!-- ŻYCIE -->
    <div class="elix-section">
      <div class="elix-section-header">
        <img class="elix-icon" src="/elix_hp.png" alt="HP">
        <div class="elix-section-title">Eliksir Życia</div>
        <select class="elix-select" id="hpLevel" onchange="calcElix()">
          <option value="5">+5</option>
          <option value="6">+6</option>
          <option value="7">+7</option>
          <option value="8">+8</option>
          <option value="9">+9</option>
        </select>
      </div>
      <div class="elix-row">
        <span class="elix-label">Aktualny %</span>
        <input class="elix-input" id="hpPct" type="number" min="0" max="100" value="50" oninput="calcElix()">
        <span style="font-size:12px;color:var(--text-dim)">%</span>
      </div>
      <div class="elix-bar-wrap"><div class="elix-bar hp" id="hpBar" style="width:50%"></div></div>
      <div class="elix-result">
        <span class="elix-result-label">Stacków do kupienia</span>
        <span class="elix-result-val" id="hpResult">—</span>
      </div>
    </div>

    <!-- MANA -->
    <div class="elix-section">
      <div class="elix-section-header">
        <img class="elix-icon" src="/elix_mp.png" alt="MP">
        <div class="elix-section-title">Eliksir Many</div>
        <select class="elix-select" id="mpLevel" onchange="calcElix()">
          <option value="5">+5</option>
          <option value="6">+6</option>
          <option value="7">+7</option>
          <option value="8">+8</option>
          <option value="9">+9</option>
        </select>
      </div>
      <div class="elix-row">
        <span class="elix-label">Aktualny %</span>
        <input class="elix-input" id="mpPct" type="number" min="0" max="100" value="50" oninput="calcElix()">
        <span style="font-size:12px;color:var(--text-dim)">%</span>
      </div>
      <div class="elix-bar-wrap"><div class="elix-bar mp" id="mpBar" style="width:50%"></div></div>
      <div class="elix-result">
        <span class="elix-result-label">Stacków do kupienia</span>
        <span class="elix-result-val" id="mpResult">—</span>
      </div>
    </div>

  </div>
</div>

<script>
/* KALKULATOR ELIKSIRÓW */
// HP eliksir na 100%: +5=6mln, +6=7mln, +7=9mln, +8=14mln, +9=18mln
const HP_MAX = { 5: 6000000, 6: 7000000, 7: 9000000, 8: 14000000, 9: 18000000 };
// MP eliksir na 100%: +5=700k, +6=800k, +7=900k, +8=1mln, +9=1.2mln
const MP_MAX = { 5: 700000, 6: 800000, 7: 900000, 8: 1000000, 9: 1200000 };
const HP_STACK = 240000;  // 1 stack mikstur życia daje 240k HP
const MP_STACK = 80000;   // 1 stack mikstur many daje 80k MP

function calcElix() {
  const hpLv  = parseInt(document.getElementById('hpLevel').value);
  const hpPct = Math.min(100, Math.max(0, parseFloat(document.getElementById('hpPct').value) || 0));
  const mpLv  = parseInt(document.getElementById('mpLevel').value);
  const mpPct = Math.min(100, Math.max(0, parseFloat(document.getElementById('mpPct').value) || 0));

  const hpMax    = HP_MAX[hpLv];
  const hpStacks = hpPct >= 100 ? 0 : Math.ceil((hpMax - hpMax * hpPct / 100) / HP_STACK);

  const mpMax    = MP_MAX[mpLv];
  const mpStacks = mpPct >= 100 ? 0 : Math.ceil((mpMax - mpMax * mpPct / 100) / MP_STACK);

  const hpEl = document.getElementById('hpResult');
  const mpEl = document.getElementById('mpResult');
  const hpBar = document.getElementById('hpBar');
  const mpBar = document.getElementById('mpBar');

  // Paski
  hpBar.style.width = Math.min(100, hpPct) + '%';
  mpBar.style.width = Math.min(100, mpPct) + '%';

  // Wyniki
  hpEl.innerText = hpPct >= 100 ? '✓ Pełny' : hpStacks + ' szt.';
  hpEl.className = 'elix-result-val' + (hpPct >= 100 ? ' zero' : hpStacks > 10 ? ' many' : '');

  mpEl.innerText = mpPct >= 100 ? '✓ Pełny' : mpStacks + ' szt.';
  mpEl.className = 'elix-result-val' + (mpPct >= 100 ? ' zero' : mpStacks > 10 ? ' many' : '');
}

function toggleElix() {
  const panel = document.getElementById('elixPanel');
  panel.classList.toggle('collapsed');
  localStorage.setItem('elixCollapsed', panel.classList.contains('collapsed') ? '1' : '0');
}

// Wczytaj stan zwinięcia
if (localStorage.getItem('elixCollapsed') === '1') {
  document.getElementById('elixPanel').classList.add('collapsed');
}

calcElix();
</script>
